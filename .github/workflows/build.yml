name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Fixes the Node 20 deprecation warning by forcing Node 24 execution environment
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgraded to Node 24 for the June 2026 GitHub transition
          # Removed the "cache: 'npm'" line because it requires a package-lock.json file

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Project Dependencies
        run: npm install # This will automatically generate the missing package-lock.json on the server

      - name: Run Web App Build Script
        run: npm run build

      - name: Generate Local Android Studio Framework Directory
        run: npx cap add android

      - name: Sync Web Assets Into Android Project Package
        run: npx cap sync android

      - name: Compile Application Using Gradle Wrapper (Assemble Debug APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Downloadable APK Artifact File
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-Debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
