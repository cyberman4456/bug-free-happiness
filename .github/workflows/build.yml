name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to manually click a button on GitHub to trigger the build

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Project Dependencies
        run: npm install

      - name: Run Web App Build Script
        run: npm run build

      - name: Generate Local Android Studio Framework Directory
        run: npx cap add android

      - name: Sync Web Assets Into Android Project Package
        run: npx cap sync android

      - name: Compile Application Using Gradle Wrapper (Assemble Debug APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Downloadable APK Artifact File
        uses: actions/upload-artifact@v4
        with:
          name: MobileApp-Debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
